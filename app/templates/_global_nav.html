{% set current_section = nav_section|default('') %}
{% set current_title = nav_title|default('法規文件轉換平台') %}
{% if auth_enabled and current_user %}
<nav class="app-navbar" aria-label="Global navigation">
  <div class="app-navbar__inner">
    <div class="app-navbar__brand">
      <a class="app-navbar__logo-link" href="{{ url_for('main.index') }}" aria-label="{{ current_title }}">
        <img class="app-navbar__logo" src="{{ url_for('static', filename='logo.svg') }}" alt="{{ current_title }}" />
      </a>
      <span class="app-navbar__system-name">文件翻譯系統</span>
    </div>
    <div class="app-navbar__meta">
      <span class="app-navbar__user">{{ current_user.display_name }}</span>
      <div class="dropdown app-navbar-menu">
        <button id="navMenuBtn" class="ghost app-navbar-menu__toggle" type="button" aria-label="使用者選單">
          <i class="bi bi-three-dots" aria-hidden="true"></i>
        </button>
        <div id="navMenuDropdown" class="dropdown-menu app-navbar-menu__panel" hidden>
          {% if current_user.is_admin %}
          <a class="dropdown-item{% if current_section == 'admin' %} is-active{% endif %}" href="{{ url_for('admin.users') }}">
            <i class="bi bi-people"></i> 使用者管理
          </a>
          {% endif %}
          {% if current_user.is_admin %}<hr />{% endif %}
          <a class="dropdown-item" href="{{ url_for('auth.logout') }}">
            <i class="bi bi-box-arrow-right"></i> 登出
          </a>
        </div>
      </div>
    </div>
  </div>
</nav>
<script>
  (() => {
    const menuBtn = document.getElementById("navMenuBtn");
    const menuDropdown = document.getElementById("navMenuDropdown");
    if (!menuBtn || !menuDropdown) return;

    menuBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      menuDropdown.hidden = !menuDropdown.hidden;
    });

    document.addEventListener("click", (event) => {
      if (!menuDropdown.hidden && !menuDropdown.contains(event.target) && event.target !== menuBtn) {
        menuDropdown.hidden = true;
      }
    });
  })();
</script>
{% endif %}

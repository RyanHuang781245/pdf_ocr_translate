<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF 翻譯重建</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}" />
  </head>
  <body class="home">
    <main class="shell">
      <header class="hero">
        <div class="hero-title-split">
          <h1>PDF 翻譯重建</h1>
          <div class="button-row--tight">
            <a class="ghost back-link" href="{{ url_for('.glossary_page') }}">詞彙庫管理</a>
            <a class="ghost back-link" href="{{ url_for('.index') }}">返回功能入口</a>
          </div>
        </div>
        <!-- <p class="eyebrow">PDF -> PP-StructureV3 -> Markdown -> HTML -> Translate -> Word</p> -->
      </header>
      <section class="upload-card upload-card-doc">
        <form method="post" enctype="multipart/form-data" action="{{ url_for('.upload_doc_workspace') }}">
          <label class="file-input">
            <span>選擇 PDF（可多選）</span>
            <input id="docUploadInput" type="file" name="pdf" accept="application/pdf" multiple />
          </label>
          <div id="docUploadFiles" class="upload-files">
            <div class="upload-files-header">
              <span id="docUploadFilesSummary">尚未選擇檔案</span>
              <button id="docUploadFilesToggle" class="ghost" type="button" style="display:none">展開</button>
            </div>
            <div id="docUploadFilesList" class="upload-files-list" style="display:none"></div>
          </div>
          <div class="form-grid">
            <label>
              <span>來源語言</span>
              <select name="source_lang">
                <option value="auto" selected>自動偵測 (auto)</option>
                <option value="en">English (en)</option>
                <option value="zh">繁體中文 (zh)</option>
              </select>
            </label>
            <label>
              <span>翻譯語言</span>
              <select name="target_lang">
                <option value="en" selected>English (en)</option>
                <option value="zh">繁體中文 (zh)</option>
              </select>
            </label>
          </div>
          <div class="form-grid">
            <label>
              <span>使用者名稱</span>
              <input type="text" name="creator_name" maxlength="60" placeholder="請輸入姓名或工號" />
            </label>
          </div>
          <div class="form-note">
            <h4><i class="bi bi-info-circle"></i> 注意事項</h4>
            <p>Word 文件排版格式不會與原始 PDF 文件完全相同，較複雜的表格可能會重建失敗，翻譯完成後請檢查輸出結果。</p>
          </div>
          <button class="primary" type="submit">開始文件轉檔</button>
        </form>
      </section>
      <section class="upload-card jobs-board">
        <div class="jobs-header">
          <div>
            <p class="eyebrow">Manage</p>
            <h2>任務列表</h2>
          </div>
          <div class="jobs-actions">
            <button id="docJobsSelectAll" class="ghost" type="button">全部勾選</button>
            <button id="docJobsSelectNone" class="ghost" type="button">取消勾選</button>
            <button id="docJobsDeleteSelected" class="danger" type="button">刪除選取任務</button>
            <button id="docJobsDownload" class="primary" type="button">下載選取文件</button>
            <button id="docJobsRefresh" class="ghost" type="button">重新整理</button>
          </div>
        </div>
        <div id="docJobsEmpty" class="hint">No document jobs yet.</div>
        <div id="docJobsList" class="jobs-list"></div>
      </section>
    </main>
    <script src="{{ url_for('static', filename='upload_files.js') }}"></script>
    <script>
      const docJobsList = document.getElementById("docJobsList");
      const docJobsEmpty = document.getElementById("docJobsEmpty");
      const docJobsRefresh = document.getElementById("docJobsRefresh");
      const docJobsSelectAll = document.getElementById("docJobsSelectAll");
      const docJobsSelectNone = document.getElementById("docJobsSelectNone");
      const docJobsDeleteSelected = document.getElementById("docJobsDeleteSelected");
      const docJobsDownload = document.getElementById("docJobsDownload");
      const selectedDocJobs = new Set();
      let docJobsLoading = false;
      let docJobsSource = null;

      function formatDate(ts) {
        if (!ts) return "Unknown";
        return new Date(ts * 1000).toLocaleString();
      }

      function formatDuration(seconds) {
        if (seconds == null || Number.isNaN(seconds)) return "";
        const total = Math.max(0, Math.floor(seconds));
        const mins = Math.floor(total / 60);
        const secs = total % 60;
        if (mins > 0) return `${mins}分${secs}秒`;
        return `${secs}秒`;
      }

      function isActiveJob(job) {
        return ["queued", "running", "cancel_requested"].includes(job.job_status);
      }

      function canRetryJob(job) {
        return ["failed", "cancelled"].includes(job.job_status);
      }

      async function cancelJob(jobId) {
        const res = await fetch(`/api/job/${jobId}/cancel`, { method: "POST" });
        if (!res.ok) throw new Error("cancel failed");
      }

      async function retryJob(jobId) {
        const res = await fetch(`/api/job/${jobId}/retry`, { method: "POST" });
        if (!res.ok) throw new Error("retry failed");
      }

      function renderDocJobs(jobs) {
        docJobsList.innerHTML = "";
        if (!jobs || jobs.length === 0) {
          docJobsEmpty.style.display = "block";
          return;
        }
        docJobsEmpty.style.display = "none";
        const available = new Set();
        jobs.forEach((job) => {
          available.add(job.job_id);
          const card = document.createElement("article");
          card.className = "job-card";

          const selectWrap = document.createElement("label");
          selectWrap.className = "job-select";
          const selectInput = document.createElement("input");
          selectInput.type = "checkbox";
          selectInput.className = "job-check";
          selectInput.dataset.jobId = job.job_id;
          selectInput.checked = selectedDocJobs.has(job.job_id);
          selectInput.addEventListener("change", () => {
            if (selectInput.checked) selectedDocJobs.add(job.job_id);
            else selectedDocJobs.delete(job.job_id);
          });
          selectWrap.appendChild(selectInput);

          const idTag = document.createElement("div");
          idTag.className = "job-badge";
          idTag.textContent = job.job_id.slice(0, 8);

          const typeTag = document.createElement("div");
          typeTag.className = "job-badge";
          typeTag.textContent = "Document";

          const statusTag = document.createElement("div");
          statusTag.className = "job-badge";
          statusTag.textContent = job.status_label || "Unknown";

          const ownerTag = document.createElement("div");
          ownerTag.className = "job-badge";
          ownerTag.textContent = `建立者：${job.creator_name || "未命名"}`;

          const title = document.createElement("div");
          title.className = "job-title";
          title.textContent = job.job_name && job.job_name.trim()
            ? job.job_name
            : `Doc ${job.job_id.slice(0, 8)}`;

          const header = document.createElement("div");
          header.className = "job-header";

          const headerMain = document.createElement("div");
          headerMain.className = "job-header-main";

          const headerMeta = document.createElement("div");
          headerMeta.className = "job-header-meta";
          headerMeta.appendChild(ownerTag);
          // headerMeta.appendChild(typeTag);
          // headerMeta.appendChild(statusTag);
          headerMeta.appendChild(idTag);
          headerMain.appendChild(selectWrap);
          headerMain.appendChild(title);
          header.appendChild(headerMain);
          header.appendChild(headerMeta);

          const meta = document.createElement("div");
          meta.className = "job-meta";
          const durationLabel = formatDuration(job.duration_seconds);
          const durationText = durationLabel ? ` · 處理時間: ${durationLabel}` : "";
          meta.textContent = `上傳時間: ${formatDate(job.updated_at)} · 狀態: ${job.status_label || "Unknown"}${durationText}`;

          const actions = document.createElement("div");
          actions.className = "job-actions";

          if (isActiveJob(job)) {
            const cancelBtn = document.createElement("button");
            cancelBtn.type = "button";
            cancelBtn.className = "ghost";
            cancelBtn.textContent = job.job_status === "cancel_requested" ? "取消中" : "取消";
            cancelBtn.disabled = job.job_status === "cancel_requested";
            cancelBtn.addEventListener("click", async () => {
              cancelBtn.disabled = true;
              try {
                await cancelJob(job.job_id);
              } catch (error) {
                alert("Cancel failed. Please try again.");
              } finally {
                loadDocJobs();
              }
            });
            actions.appendChild(cancelBtn);
          }

          // if (job.structure_md_url) {
          //   const mdLink = document.createElement("a");
          //   mdLink.href = `${job.structure_md_url}?download=1`;
          //   mdLink.textContent = "下載原始 MD";
          //   mdLink.className = "ghost";
          //   actions.appendChild(mdLink);
          // }

          // if (job.structure_html_url) {
          //   const htmlLink = document.createElement("a");
          //   htmlLink.href = `${job.structure_html_url}?download=1`;
          //   htmlLink.textContent = "下載原始 HTML";
          //   htmlLink.className = "ghost";
          //   actions.appendChild(htmlLink);
          // }

          // if (job.translated_html_url) {
          //   const translatedLink = document.createElement("a");
          //   translatedLink.href = `${job.translated_html_url}?download=1`;
          //   translatedLink.textContent = "下載翻譯 HTML";
          //   translatedLink.className = "ghost";
          //   actions.appendChild(translatedLink);
          // }

          if (job.docx_url) {
            const docxLink = document.createElement("a");
            docxLink.href = `${job.docx_url}?download=1`;
            docxLink.textContent = "下載 Word";
            docxLink.className = "ghost";
            docxLink.download = job.download_name || `${job.job_id}.docx`;
            actions.appendChild(docxLink);
          }

          if (canRetryJob(job)) {
            const retryBtn = document.createElement("button");
            retryBtn.type = "button";
            retryBtn.className = "ghost";
            retryBtn.textContent = "重試";
            retryBtn.addEventListener("click", async () => {
              retryBtn.disabled = true;
              try {
                await retryJob(job.job_id);
              } catch (error) {
                alert("Retry failed. Please try again.");
              } finally {
                loadDocJobs();
              }
            });
            actions.appendChild(retryBtn);
          }

          const deleteBtn = document.createElement("button");
          deleteBtn.type = "button";
          deleteBtn.className = "danger job-delete";
          deleteBtn.textContent = "刪除";
          deleteBtn.addEventListener("click", async () => {
            const ok = confirm(`Delete job ${job.job_id}? This cannot be undone.`);
            if (!ok) return;
            deleteBtn.disabled = true;
            try {
              const res = await fetch(`/api/job/${job.job_id}`, { method: "DELETE" });
              if (!res.ok) alert("Delete failed. Please try again.");
            } catch (error) {
              alert("Delete failed. Please try again.");
            } finally {
              deleteBtn.disabled = false;
              loadDocJobs();
            }
          });
          actions.appendChild(deleteBtn);

          card.appendChild(header);
          card.appendChild(meta);
          card.appendChild(actions);
          docJobsList.appendChild(card);
        });
        Array.from(selectedDocJobs).forEach((jobId) => {
          if (!available.has(jobId)) selectedDocJobs.delete(jobId);
        });
      }

      function setAllDocSelections(checked) {
        const inputs = docJobsList.querySelectorAll("input.job-check");
        inputs.forEach((input) => {
          const jobId = input.dataset.jobId;
          if (!jobId) return;
          input.checked = checked;
          if (checked) selectedDocJobs.add(jobId);
          else selectedDocJobs.delete(jobId);
        });
      }

      async function deleteSelectedDocJobs() {
        const jobIds = Array.from(selectedDocJobs);
        if (jobIds.length === 0) {
          alert("請先選取要刪除的任務。");
          return;
        }
        const ok = confirm(`確定要刪除 ${jobIds.length} 個任務？此操作無法復原。`);
        if (!ok) return;
        docJobsDeleteSelected.disabled = true;
        let failed = 0;
        for (const jobId of jobIds) {
          try {
            const res = await fetch(`/api/job/${jobId}`, { method: "DELETE" });
            if (!res.ok) {
              failed += 1;
              continue;
            }
            selectedDocJobs.delete(jobId);
          } catch (error) {
            failed += 1;
          }
        }
        docJobsDeleteSelected.disabled = false;
        if (failed > 0) {
          alert(`${failed} 個任務刪除失敗，請重新整理後再試。`);
        }
        loadDocJobs();
      }

      async function downloadSelectedDocJobs() {
        if (selectedDocJobs.size === 0) {
          alert("請先選取要下載的任務。");
          return;
        }
        docJobsDownload.disabled = true;
        try {
          const res = await fetch("/api/doc-jobs/download-docx", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ job_ids: Array.from(selectedDocJobs) }),
          });
          if (!res.ok) {
            let msg = "下載失敗，找不到可下載的 Word 文件。";
            try {
              const body = await res.json();
              if (body && body.error) msg = body.error;
            } catch (error) {}
            alert(msg);
            return;
          }
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const anchor = document.createElement("a");
          anchor.href = url;
          anchor.download = "document_workspace_docx.zip";
          document.body.appendChild(anchor);
          anchor.click();
          anchor.remove();
          URL.revokeObjectURL(url);
        } catch (error) {
          alert("下載失敗，請稍後再試。");
        } finally {
          docJobsDownload.disabled = false;
        }
      }

      async function loadDocJobs() {
        if (docJobsLoading) return;
        docJobsLoading = true;
        docJobsList.innerHTML = '<div class="hint">Loading...</div>';
        try {
          const res = await fetch("/api/doc-jobs");
          if (!res.ok) return renderDocJobs([]);
          const data = await res.json();
          renderDocJobs(data.jobs || []);
        } catch (error) {
          renderDocJobs([]);
        } finally {
          docJobsLoading = false;
        }
      }

      function connectDocJobsStream() {
        if (!window.EventSource) return;
        if (docJobsSource) docJobsSource.close();
        docJobsSource = new EventSource("/api/doc-jobs/stream");
        docJobsSource.addEventListener("jobs", (event) => {
          try {
            renderDocJobs((JSON.parse(event.data) || {}).jobs || []);
          } catch (error) {}
        });
        docJobsSource.onerror = () => {
          if (docJobsSource) {
            docJobsSource.close();
            docJobsSource = null;
          }
          setTimeout(connectDocJobsStream, 5000);
        };
      }

      docJobsRefresh.addEventListener("click", loadDocJobs);
      docJobsSelectAll.addEventListener("click", () => setAllDocSelections(true));
      docJobsSelectNone.addEventListener("click", () => setAllDocSelections(false));
      docJobsDeleteSelected.addEventListener("click", deleteSelectedDocJobs);
      docJobsDownload.addEventListener("click", downloadSelectedDocJobs);
      bindUploadFiles({
        inputId: "docUploadInput",
        summaryId: "docUploadFilesSummary",
        toggleId: "docUploadFilesToggle",
        listId: "docUploadFilesList",
      });
      loadDocJobs();
      connectDocJobsStream();
    </script>
  </body>
</html>

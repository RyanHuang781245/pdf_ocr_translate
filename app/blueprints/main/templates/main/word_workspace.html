<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Word 原版面翻譯</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}" />
  </head>
  <body class="home has-global-nav">
    {% set nav_section = 'word' %}
    {% set nav_title = '法規文件轉換平台' %}
    {% include "_global_nav.html" %}
    <main class="shell shell--wide">
      <header class="hero">
        <div class="hero-title-split">
          <h1>Word 原版面翻譯</h1>
          <div class="button-row--tight">
            <a class="ghost back-link" href="{{ url_for('.glossary_page') }}">詞彙庫管理</a>
            <a class="ghost back-link" href="{{ url_for('.index') }}">返回功能入口</a>
          </div>
        </div>
      </header>
      <section class="upload-card upload-card-doc">
        <form method="post" enctype="multipart/form-data" action="{{ url_for('.upload_word_workspace') }}">
          <label class="file-input">
            <span>選擇 Word（.doc / .docx，可多選）</span>
            <input id="wordUploadInput" type="file" name="docx" accept=".doc,.docx,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" multiple />
          </label>
          <div id="wordUploadFiles" class="upload-files">
            <div class="upload-files-header">
              <span id="wordUploadFilesSummary">尚未選擇檔案</span>
              <button id="wordUploadFilesToggle" class="ghost" type="button" style="display:none">展開</button>
            </div>
            <div id="wordUploadFilesList" class="upload-files-list" style="display:none"></div>
          </div>
          <div class="form-grid">
            <label>
              <span>來源語言</span>
              <select name="source_lang">
                <option value="auto" selected>自動偵測 (auto)</option>
                <option value="en">English (en)</option>
                <option value="zh">繁體中文 (zh)</option>
              </select>
            </label>
            <label>
              <span>翻譯語言</span>
              <select name="target_lang">
                <option value="en" selected>English (en)</option>
                <option value="zh">繁體中文 (zh)</option>
              </select>
            </label>
          </div>
          <div class="form-note">
            <h4><i class="bi bi-info-circle"></i> 注意事項</h4>
            <p>Word 原版面翻譯會盡量保留原始 Word 文件的段落、表格、樣式與版面配置，翻譯完成後請檢查輸出結果。</p>
          </div>
          <!-- <label>
            <span>保留術語</span>
            <textarea name="retain_terms" rows="4" placeholder="每行或逗號分隔，例如：AcmeCorp, ProjectX"></textarea>
          </label> -->
          <button class="primary" type="submit">開始 Word 翻譯</button>
        </form>
      </section>
      <section class="upload-card jobs-board">
        <div class="jobs-header">
          <div>
            <p class="eyebrow">Manage</p>
            <h2>任務列表</h2>
          </div>
          <div class="jobs-actions">
            <button id="wordJobsSelectAll" class="ghost" type="button">全部勾選</button>
            <button id="wordJobsSelectNone" class="ghost" type="button">取消勾選</button>
            <button id="wordJobsDeleteSelected" class="danger" type="button">刪除選取任務</button>
            <button id="wordJobsDownload" class="primary" type="button">下載選取文件</button>
            <button id="wordJobsRefresh" class="ghost" type="button">重新整理</button>
          </div>
        </div>
        <div id="wordJobsEmpty" class="hint">No Word jobs yet.</div>
        <div id="wordJobsList" class="jobs-list"></div>
      </section>
    </main>
    <script src="{{ url_for('static', filename='upload_files.js') }}"></script>
    <script>
      const wordJobsList = document.getElementById("wordJobsList");
      const wordJobsEmpty = document.getElementById("wordJobsEmpty");
      const wordJobsRefresh = document.getElementById("wordJobsRefresh");
      const wordJobsSelectAll = document.getElementById("wordJobsSelectAll");
      const wordJobsSelectNone = document.getElementById("wordJobsSelectNone");
      const wordJobsDeleteSelected = document.getElementById("wordJobsDeleteSelected");
      const wordJobsDownload = document.getElementById("wordJobsDownload");
      const selectedWordJobs = new Set();
      let wordJobsLoading = false;
      let wordJobsSource = null;

      function formatDate(ts) {
        if (!ts) return "Unknown";
        return new Date(ts * 1000).toLocaleString();
      }

      function formatDuration(seconds) {
        if (seconds == null || Number.isNaN(seconds)) return "";
        const total = Math.max(0, Math.floor(seconds));
        const mins = Math.floor(total / 60);
        const secs = total % 60;
        if (mins > 0) return `${mins}分${secs}秒`;
        return `${secs}秒`;
      }

      function isActiveJob(job) {
        return ["queued", "running", "cancel_requested"].includes(job.job_status);
      }

      function canRetryJob(job) {
        return ["failed", "cancelled"].includes(job.job_status);
      }

      async function cancelJob(jobId) {
        const res = await fetch(`/api/job/${jobId}/cancel`, { method: "POST" });
        if (!res.ok) throw new Error("cancel failed");
      }

      async function retryJob(jobId) {
        const res = await fetch(`/api/job/${jobId}/retry`, { method: "POST" });
        if (!res.ok) throw new Error("retry failed");
      }

      function renderWordJobs(jobs) {
        wordJobsList.innerHTML = "";
        if (!jobs || jobs.length === 0) {
          wordJobsEmpty.style.display = "block";
          return;
        }
        wordJobsEmpty.style.display = "none";
        const available = new Set();
        jobs.forEach((job) => {
          available.add(job.job_id);
          const card = document.createElement("article");
          card.className = "job-card";

          const selectWrap = document.createElement("label");
          selectWrap.className = "job-select";
          const selectInput = document.createElement("input");
          selectInput.type = "checkbox";
          selectInput.className = "job-check";
          selectInput.dataset.jobId = job.job_id;
          selectInput.checked = selectedWordJobs.has(job.job_id);
          selectInput.addEventListener("change", () => {
            if (selectInput.checked) selectedWordJobs.add(job.job_id);
            else selectedWordJobs.delete(job.job_id);
          });
          selectWrap.appendChild(selectInput);

          const idTag = document.createElement("div");
          idTag.className = "job-badge";
          idTag.textContent = job.job_id.slice(0, 8);

          const typeTag = document.createElement("div");
          typeTag.className = "job-badge";
          typeTag.textContent = "Word";

          const statusTag = document.createElement("div");
          statusTag.className = "job-badge";
          statusTag.textContent = job.status_label || "Unknown";

          const ownerTag = document.createElement("div");
          ownerTag.className = "job-badge";
          ownerTag.textContent = `建立者：${job.creator_name || "未命名"}`;

          const title = document.createElement("div");
          title.className = "job-title";
          title.textContent = job.job_name && job.job_name.trim()
            ? job.job_name
            : `Word ${job.job_id.slice(0, 8)}`;

          const header = document.createElement("div");
          header.className = "job-header";

          const headerMain = document.createElement("div");
          headerMain.className = "job-header-main";

          const headerMeta = document.createElement("div");
          headerMeta.className = "job-header-meta";
          headerMeta.appendChild(ownerTag);
          // headerMeta.appendChild(typeTag);
          // headerMeta.appendChild(statusTag);
          headerMeta.appendChild(idTag);
          headerMain.appendChild(selectWrap);
          headerMain.appendChild(title);
          header.appendChild(headerMain);
          header.appendChild(headerMeta);

          const meta = document.createElement("div");
          meta.className = "job-meta";
          const durationLabel = formatDuration(job.duration_seconds);
          const durationText = durationLabel ? ` · 處理時間: ${durationLabel}` : "";
          const progressText = typeof job.progress === "number" ? ` · 進度: ${job.progress.toFixed(0)}%` : "";
          const qualityText = typeof job.avg_quality === "number" && job.avg_quality > 0
            ? ` · 品質: ${job.avg_quality.toFixed(1)}/40`
            : "";
          // meta.textContent = `上傳時間: ${formatDate(job.updated_at)} · 狀態: ${job.status_label || "Unknown"}${durationText}${progressText}${qualityText}`;
          meta.textContent = `上傳時間: ${formatDate(job.updated_at)} · 狀態: ${job.status_label || "Unknown"}${durationText}${progressText}`;

          const actions = document.createElement("div");
          actions.className = "job-actions";

          if (isActiveJob(job)) {
            const cancelBtn = document.createElement("button");
            cancelBtn.type = "button";
            cancelBtn.className = "ghost";
            cancelBtn.textContent = job.job_status === "cancel_requested" ? "取消中" : "取消";
            cancelBtn.disabled = job.job_status === "cancel_requested";
            cancelBtn.addEventListener("click", async () => {
              if (cancelBtn.disabled) return;
              cancelBtn.disabled = true;
              try {
                await cancelJob(job.job_id);
              } catch (error) {
                alert("Cancel failed. Please try again.");
              } finally {
                loadWordJobs();
              }
            });
            actions.appendChild(cancelBtn);
          }

          if (job.docx_url) {
            const docxLink = document.createElement("a");
            docxLink.href = `${job.docx_url}?download=1`;
            docxLink.textContent = "下載翻譯 Word";
            docxLink.className = "ghost";
            docxLink.download = job.download_name || `${job.job_id}.docx`;
            actions.appendChild(docxLink);
          }

          if (canRetryJob(job)) {
            const retryBtn = document.createElement("button");
            retryBtn.type = "button";
            retryBtn.className = "ghost";
            retryBtn.textContent = "重試";
            retryBtn.addEventListener("click", async () => {
              retryBtn.disabled = true;
              try {
                await retryJob(job.job_id);
              } catch (error) {
                alert("Retry failed. Please try again.");
              } finally {
                loadWordJobs();
              }
            });
            actions.appendChild(retryBtn);
          }

          const deleteBtn = document.createElement("button");
          deleteBtn.type = "button";
          deleteBtn.className = "danger job-delete";
          deleteBtn.textContent = "刪除";
          deleteBtn.addEventListener("click", async () => {
            const ok = confirm(`Delete job ${job.job_id}? This cannot be undone.`);
            if (!ok) return;
            deleteBtn.disabled = true;
            try {
              const res = await fetch(`/api/job/${job.job_id}`, { method: "DELETE" });
              if (!res.ok) alert("Delete failed. Please try again.");
            } catch (error) {
              alert("Delete failed. Please try again.");
            } finally {
              deleteBtn.disabled = false;
              loadWordJobs();
            }
          });
          actions.appendChild(deleteBtn);

          card.appendChild(header);
          card.appendChild(meta);
          card.appendChild(actions);
          wordJobsList.appendChild(card);
        });
        Array.from(selectedWordJobs).forEach((jobId) => {
          if (!available.has(jobId)) selectedWordJobs.delete(jobId);
        });
      }

      function setAllWordSelections(checked) {
        const inputs = wordJobsList.querySelectorAll("input.job-check");
        inputs.forEach((input) => {
          const jobId = input.dataset.jobId;
          if (!jobId) return;
          input.checked = checked;
          if (checked) selectedWordJobs.add(jobId);
          else selectedWordJobs.delete(jobId);
        });
      }

      async function deleteSelectedWordJobs() {
        const jobIds = Array.from(selectedWordJobs);
        if (jobIds.length === 0) {
          alert("請先選取要刪除的任務。");
          return;
        }
        const ok = confirm(`確定要刪除 ${jobIds.length} 個任務？此操作無法復原。`);
        if (!ok) return;
        wordJobsDeleteSelected.disabled = true;
        let failed = 0;
        for (const jobId of jobIds) {
          try {
            const res = await fetch(`/api/job/${jobId}`, { method: "DELETE" });
            if (!res.ok) {
              failed += 1;
              continue;
            }
            selectedWordJobs.delete(jobId);
          } catch (error) {
            failed += 1;
          }
        }
        wordJobsDeleteSelected.disabled = false;
        if (failed > 0) {
          alert(`${failed} 個任務刪除失敗，請重新整理後再試。`);
        }
        loadWordJobs();
      }

      async function downloadSelectedWordJobs() {
        if (selectedWordJobs.size === 0) {
          alert("請先選取要下載的任務。");
          return;
        }
        wordJobsDownload.disabled = true;
        try {
          const res = await fetch("/api/word-jobs/download-docx", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ job_ids: Array.from(selectedWordJobs) }),
          });
          if (!res.ok) {
            let msg = "下載失敗，找不到可下載的 Word 文件。";
            try {
              const body = await res.json();
              if (body && body.error) msg = body.error;
            } catch (error) {}
            alert(msg);
            return;
          }
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const anchor = document.createElement("a");
          anchor.href = url;
          anchor.download = "translated_word_docx.zip";
          document.body.appendChild(anchor);
          anchor.click();
          anchor.remove();
          URL.revokeObjectURL(url);
        } catch (error) {
          alert("下載失敗，請稍後再試。");
        } finally {
          wordJobsDownload.disabled = false;
        }
      }

      async function loadWordJobs() {
        if (wordJobsLoading) return;
        wordJobsLoading = true;
        wordJobsList.innerHTML = '<div class="hint">Loading...</div>';
        try {
          const res = await fetch("/api/word-jobs");
          if (!res.ok) return renderWordJobs([]);
          const data = await res.json();
          renderWordJobs(data.jobs || []);
        } catch (error) {
          renderWordJobs([]);
        } finally {
          wordJobsLoading = false;
        }
      }

      function connectWordJobsStream() {
        if (!window.EventSource) return;
        if (wordJobsSource) wordJobsSource.close();
        wordJobsSource = new EventSource("/api/word-jobs/stream");
        wordJobsSource.addEventListener("jobs", (event) => {
          try {
            renderWordJobs((JSON.parse(event.data) || {}).jobs || []);
          } catch (error) {}
        });
        wordJobsSource.onerror = () => {
          if (wordJobsSource) {
            wordJobsSource.close();
            wordJobsSource = null;
          }
          setTimeout(connectWordJobsStream, 5000);
        };
      }

      wordJobsRefresh.addEventListener("click", loadWordJobs);
      wordJobsSelectAll.addEventListener("click", () => setAllWordSelections(true));
      wordJobsSelectNone.addEventListener("click", () => setAllWordSelections(false));
      wordJobsDeleteSelected.addEventListener("click", deleteSelectedWordJobs);
      wordJobsDownload.addEventListener("click", downloadSelectedWordJobs);
      bindUploadFiles({
        inputId: "wordUploadInput",
        summaryId: "wordUploadFilesSummary",
        toggleId: "wordUploadFilesToggle",
        listId: "wordUploadFilesList",
      });
      loadWordJobs();
      connectWordJobsStream();
    </script>
  </body>
</html>

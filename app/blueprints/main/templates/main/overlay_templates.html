<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF 原版面翻譯 / 欄位翻譯模板</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" data-local-href="{{ url_for('static', filename='vendor/bootstrap-icons/bootstrap-icons.min.css') }}" onerror="this.onerror=null;this.href=this.dataset.localHref;" />
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}" />
  </head>
  <body class="home has-global-nav">
    {% set nav_section = 'templates' %}
    {% set nav_title = '法規文件轉換平台' %}
    {% include "_global_nav.html" %}
    <main class="shell shell--wide">
      <header class="hero">
        <div class="hero-title-split">
          <h1>欄位翻譯模板</h1>
          <div class="button-row--tight">
            <a class="ghost back-link" href="{{ url_for('.overlay_workspace') }}">返回 PDF 原版面翻譯</a>
          </div>
        </div>
      </header>

      <section class="upload-card">
        <div class="jobs-header">
          <div>
          </div>
        </div>
        <form method="post" enctype="multipart/form-data" action="{{ url_for('.upload_template_source') }}">
          <label class="file-input">
            <span>選擇 PDF</span>
            <input type="file" name="pdf" accept="application/pdf" required />
          </label>
          <div class="form-grid">
            <label>
              <span>指定頁面</span>
              <input type="number" name="page" value="1" min="1" required />
            </label>
          </div>
          <button class="primary" type="submit">上傳文件</button>
        </form>
      </section>
      <section class="upload-card jobs-board">
        <div class="jobs-header">
          <div>
            <p class="eyebrow">Templates</p>
            <h2>模板列表</h2>
            <div id="templatesFilterCount" class="job-muted"></div>
          </div>
          <div class="jobs-actions">
            <button id="templatesRefresh" class="ghost" type="button">重新整理</button>
          </div>
        </div>
        <div class="jobs-filterbar jobs-filterbar--compact">
          <label>
            <span>搜尋</span>
            <input id="templatesSearch" type="text" placeholder="模板名稱、來源文件、建立者、模板 ID" />
          </label>
          <label>
            <span>狀態</span>
            <select id="templatesStatusFilter">
              <option value="all">全部狀態</option>
              <option value="completed">已保存</option>
              <option value="draft">草稿</option>
            </select>
          </label>
          <button id="templatesFiltersReset" class="ghost" type="button">重設</button>
        </div>
        <div id="templatesEmpty" class="hint">尚未建立模板。</div>
        <div id="templatesList" class="jobs-list"></div>
        <div id="templatesPagination" class="jobs-pagination"></div>
      </section>
    </main>

    <div id="renameTemplateModal" class="modal" hidden>
      <div class="modal-card modal-card--compact" role="dialog" aria-modal="true" aria-labelledby="renameTemplateTitle">
        <div class="modal-header">
          <h2 id="renameTemplateTitle">重新命名模板</h2>
        </div>
        <div class="modal-body">
          <label>
            <span>模板名稱</span>
            <input id="renameTemplateName" type="text" />
          </label>
          <div class="modal-actions">
            <button id="cancelRenameTemplate" class="ghost" type="button">取消</button>
            <button id="confirmRenameTemplate" class="primary" type="button">儲存</button>
          </div>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='job_filters.js') }}"></script>
    <script>
      const templatesList = document.getElementById("templatesList");
      const templatesEmpty = document.getElementById("templatesEmpty");
      const templatesRefresh = document.getElementById("templatesRefresh");
      const templatesFilterCount = document.getElementById("templatesFilterCount");
      const templatesSearch = document.getElementById("templatesSearch");
      const templatesStatusFilter = document.getElementById("templatesStatusFilter");
      const templatesPagination = document.getElementById("templatesPagination");
      const renameTemplateModal = document.getElementById("renameTemplateModal");
      const renameTemplateName = document.getElementById("renameTemplateName");
      const cancelRenameTemplate = document.getElementById("cancelRenameTemplate");
      const confirmRenameTemplate = document.getElementById("confirmRenameTemplate");
      let jobMap = new Map();
      let allTemplates = [];
      const templatesPageState = { page: 1, pageSize: 10 };
      let templatesSource = null;
      let pendingRenameTemplate = null;

      function formatDate(ts) {
        if (!ts) return "Unknown";
        return new Date(ts * 1000).toLocaleString();
      }

      async function deleteTemplate(templateId, triggerBtn) {
        if (!templateId) return;
        const ok = confirm(`確定要刪除模板 ${templateId} 嗎？`);
        if (!ok) return;
        if (triggerBtn) {
          triggerBtn.disabled = true;
        }
        try {
          const res = await fetch(`/api/document-templates/${templateId}`, { method: "DELETE" });
          const payload = await res.json().catch(() => ({}));
          if (!res.ok) {
            alert(payload.error || "刪除模板失敗。");
            return;
          }
          await loadTemplates();
        } catch (error) {
          alert("刪除模板失敗。");
        } finally {
          if (triggerBtn) {
            triggerBtn.disabled = false;
          }
        }
      }

      function openRenameTemplateModal(template) {
        if (!template?.id) return;
        pendingRenameTemplate = template;
        if (renameTemplateName) {
          renameTemplateName.value = template.name || template.display_name || "";
        }
        if (renameTemplateModal) {
          renameTemplateModal.hidden = false;
        }
        renameTemplateName?.focus();
        renameTemplateName?.select();
      }

      function closeRenameTemplateModal() {
        pendingRenameTemplate = null;
        if (renameTemplateModal) {
          renameTemplateModal.hidden = true;
        }
        if (renameTemplateName) {
          renameTemplateName.value = "";
        }
      }

      async function renameTemplate() {
        const template = pendingRenameTemplate;
        if (!template?.id) return;
        const currentName = template.name || template.display_name || "";
        const cleanedName = renameTemplateName?.value?.trim() || "";
        if (!cleanedName) {
          alert("模板名稱不可空白。");
          renameTemplateName?.focus();
          return;
        }
        if (cleanedName === currentName) {
          closeRenameTemplateModal();
          return;
        }
        if (confirmRenameTemplate) {
          confirmRenameTemplate.disabled = true;
          confirmRenameTemplate.textContent = "儲存中...";
        }
        try {
          const res = await fetch(`/api/document-templates/${template.id}/name`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: cleanedName }),
          });
          const payload = await res.json().catch(() => ({}));
          if (!res.ok) {
            alert(payload.error || "重新命名模板失敗。");
            return;
          }
          closeRenameTemplateModal();
          await loadTemplates();
        } catch (error) {
          alert("重新命名模板失敗。");
        } finally {
          if (confirmRenameTemplate) {
            confirmRenameTemplate.disabled = false;
            confirmRenameTemplate.textContent = "儲存";
          }
        }
      }

      function templateFilterItems(items) {
        return (items || []).map((template) => ({
          ...template,
          job_status: template.status === "saved" ? "saved" : "draft",
          job_id: template.id,
          job_name: template.name || template.display_name || "",
          creator_name: template.creator_label || template.creator_work_id || "",
        }));
      }

      function renderTemplates(items) {
        templatesList.innerHTML = "";
        if (!items || items.length === 0) {
          templatesEmpty.style.display = "block";
          return;
        }
        templatesEmpty.style.display = "none";
        items.forEach((template) => {
          const card = document.createElement("article");
          card.className = "job-card template-card";

          const header = document.createElement("div");
          header.className = "job-header";

          const headerMain = document.createElement("div");
          headerMain.className = "job-header-main";

          const title = document.createElement("div");
          title.className = "job-title";
          title.textContent = template.name || template.display_name || template.id.slice(0, 8);
          headerMain.appendChild(title);

          const headerMeta = document.createElement("div");
          headerMeta.className = "job-header-meta";

          const ownerTag = document.createElement("div");
          ownerTag.className = "job-badge";
          ownerTag.textContent = `建立者：${template.creator_label || template.creator_work_id || "未填寫"}`;
          headerMeta.appendChild(ownerTag);

          const idTag = document.createElement("div");
          idTag.className = "job-badge";
          idTag.textContent = template.id.slice(0, 8);
          headerMeta.appendChild(idTag);

          header.appendChild(headerMain);
          header.appendChild(headerMeta);

          const sourceLabel = document.createElement("span");
          sourceLabel.className = "job-muted";
          sourceLabel.textContent = `來源文件: ${template.display_name || "-"}`;

          const meta = document.createElement("div");
          meta.className = "job-meta";
          const statusLabel = template.status === "saved" ? "已保存" : "草稿";
          const sourceJob = jobMap.get(template.source_job_id || "");
          const jobStatus = sourceJob?.status_label || sourceJob?.status || "Unknown";
          meta.textContent = `上傳時間: ${formatDate(template.updated_at)} · 來源文件: ${template.display_name || "-"} · 狀態: ${statusLabel} · OCR: ${jobStatus}`;

          const actions = document.createElement("div");
          actions.className = "job-actions";

          if (template.source_job_id && sourceJob && ["completed", "done"].includes((sourceJob.status_code || "").toLowerCase()) && sourceJob.can_open_editor) {
            const editLink = document.createElement("a");
            editLink.className = "ghost";
            editLink.href = `/workspace/pdf-overlay/templates/${template.source_job_id}`;
            editLink.textContent = "編輯";
            actions.appendChild(editLink);
          } else if (template.source_job_id && sourceJob && ["completed", "done"].includes((sourceJob.status_code || "").toLowerCase())) {
            const completedLabel = document.createElement("span");
            completedLabel.className = "job-muted";
            completedLabel.textContent = "OCR 已完成";
            actions.appendChild(completedLabel);
          } else {
            const pendingLabel = document.createElement("span");
            pendingLabel.className = "job-muted";
            pendingLabel.textContent = "等待 OCR 完成";
            actions.appendChild(pendingLabel);
          }

          if (template.can_edit_source) {
            const renameBtn = document.createElement("button");
            renameBtn.type = "button";
            renameBtn.className = "ghost";
            renameBtn.textContent = "重新命名";
            renameBtn.addEventListener("click", () => {
              openRenameTemplateModal(template);
            });
            actions.appendChild(renameBtn);
          }

          if (template.can_delete) {
            const deleteBtn = document.createElement("button");
            deleteBtn.type = "button";
            deleteBtn.className = "danger job-delete";
            deleteBtn.textContent = "刪除";
            deleteBtn.addEventListener("click", () => {
              deleteTemplate(template.id, deleteBtn);
            });
            actions.appendChild(deleteBtn);
          }

          card.appendChild(header);
          card.appendChild(meta);
          card.appendChild(actions);
          templatesList.appendChild(card);
        });
      }

      function applyTemplateFilters() {
        const filtered = JobFilters.apply(templateFilterItems(allTemplates), {
          query: templatesSearch?.value,
          status: templatesStatusFilter?.value,
          fields: ["id", "name", "display_name", "source_job_id", "job_name", "creator_name", "creator_work_id", "creator_label"],
        });
        if (templatesFilterCount) {
          templatesFilterCount.textContent = `顯示 ${filtered.length} / ${allTemplates.length} 個模板`;
        }
        const pageInfo = JobFilters.paginate(filtered, templatesPageState);
        renderTemplates(pageInfo.items);
        JobFilters.renderPagination(templatesPagination, pageInfo, templatesPageState, applyTemplateFilters);
      }

      async function loadTemplates() {
        templatesList.innerHTML = '<div class="hint">Loading...</div>';
        try {
          const jobsRes = await fetch("/api/document-templates/source-jobs");
          if (jobsRes.ok) {
            const jobsPayload = await jobsRes.json();
            jobMap = new Map((jobsPayload.jobs || []).map((item) => [item.job_id, item]));
          } else {
            jobMap = new Map();
          }
          const res = await fetch("/api/document-templates");
          if (!res.ok) {
            allTemplates = [];
            applyTemplateFilters();
            return;
          }
          const payload = await res.json();
          allTemplates = payload.templates || [];
          applyTemplateFilters();
        } catch (error) {
          allTemplates = [];
          applyTemplateFilters();
        }
      }

      async function refreshTemplatesFromJobs(jobs) {
        jobMap = new Map((jobs || []).map((item) => [item.job_id, item]));
        try {
          const res = await fetch("/api/document-templates");
          if (!res.ok) {
            allTemplates = [];
            applyTemplateFilters();
            return;
          }
          const payload = await res.json();
          allTemplates = payload.templates || [];
          applyTemplateFilters();
        } catch (error) {
          allTemplates = [];
          applyTemplateFilters();
        }
      }

      function connectTemplatesStream() {
        if (!window.EventSource) return;
        if (templatesSource) templatesSource.close();
        templatesSource = new EventSource("/api/document-templates/source-jobs/stream");
        templatesSource.addEventListener("jobs", async (event) => {
          try {
            const payload = JSON.parse(event.data) || {};
            await refreshTemplatesFromJobs(payload.jobs || []);
          } catch (error) {}
        });
        templatesSource.onerror = () => {
          if (templatesSource) {
            templatesSource.close();
            templatesSource = null;
          }
          setTimeout(connectTemplatesStream, 5000);
        };
      }

      cancelRenameTemplate?.addEventListener("click", closeRenameTemplateModal);
      confirmRenameTemplate?.addEventListener("click", renameTemplate);
      renameTemplateName?.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          renameTemplate();
        } else if (event.key === "Escape") {
          closeRenameTemplateModal();
        }
      });
      renameTemplateModal?.addEventListener("click", (event) => {
        if (event.target === renameTemplateModal) {
          closeRenameTemplateModal();
        }
      });

      templatesRefresh?.addEventListener("click", loadTemplates);
      JobFilters.bind({
        searchId: "templatesSearch",
        statusId: "templatesStatusFilter",
        resetId: "templatesFiltersReset",
        onChange: () => {
          templatesPageState.page = 1;
          applyTemplateFilters();
        },
      });
      loadTemplates();
      connectTemplatesStream();
    </script>
  </body>
</html>
